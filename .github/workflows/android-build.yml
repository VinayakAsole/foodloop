name: Build Android APK

on:
  push:
    branches: [ main ] # Triggers the build when you push to the main branch
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows you to trigger the build manually from the Actions tab

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'project/frontend/package-lock.json'

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Frontend Dependencies
        run: |
          cd project/frontend
          npm ci

      - name: Compile Production Web Assets
        run: |
          cd project/frontend
          npm run build

      - name: Sync Web Assets to Capacitor Android
        run: |
          cd project/frontend
          npx cap sync android

      - name: Make Gradle Wrapper Executable
        run: |
          chmod +x project/frontend/android/gradlew

      - name: Compile Debug APK using Gradle
        run: |
          cd project/frontend/android
          ./gradlew assembleDebug

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FoodLoop-Android-Debug-APK
          path: project/frontend/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7
